[project]
name = "silverfish-core"
version = "0.0.0"
description = "Silverfish core library — domain rules, ports, services and reference adapters for an ebook library"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "GPL-3.0-or-later" }
dependencies = [
    "unidecode>=1.4",
    "sqlalchemy>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/silverfish_core"]
