[project]
name = "silverfish-core"
dynamic = ["version"]
description = "Silverfish core library — domain rules, ports, services and reference adapters for an ebook library"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "GPL-3.0-or-later" }
dependencies = [
    "unidecode>=1.4",
    "sqlalchemy>=2.0",
    "defusedxml>=0.7",
]

# Optional driver for using Postgres as the system store (or, later, the
# library). Kept out of the default install so SQLite-only deployments stay
# lean: `uv pip install silverfish-core[postgres]`.
[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.2"]
# S3 (or S3-compatible) book-file storage. Kept optional so local/SQLite-only
# deployments stay lean: `uv pip install silverfish-core[s3]`.
s3 = ["boto3>=1.35"]
# Google Drive book-file storage. `uv pip install silverfish-core[gdrive]`.
# google-auth-oauthlib is for the one-off scripts/gdrive_authorize.py helper.
gdrive = [
    "google-api-python-client>=2.140",
    "google-auth>=2.34",
    "google-auth-oauthlib>=1.2",
]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

# Version is derived from git tags (vX.Y.Z), not stored in this file, so
# concurrent feature PRs never conflict on a version line. Between releases the
# version reads like "0.1.0.postN+g<sha>"; tagging produces the clean number.
[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = true

[tool.hatch.build.targets.wheel]
packages = ["src/silverfish_core"]
