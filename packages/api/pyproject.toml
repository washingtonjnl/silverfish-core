[project]
name = "silverfish-api"
version = "0.0.0"
description = "Silverfish API — thin FastAPI layer exposing the core over HTTP, generating the OpenAPI contract"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "GPL-3.0-or-later" }
dependencies = [
    "silverfish-core",
    "fastapi>=0.121",
    "uvicorn[standard]>=0.40",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/silverfish_api"]
