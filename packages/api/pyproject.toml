[project]
name = "silverfish-api"
dynamic = ["version"]
description = "Silverfish API — thin FastAPI layer exposing the core over HTTP, generating the OpenAPI contract"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "GPL-3.0-or-later" }
dependencies = [
    "silverfish-core",
    "fastapi>=0.121",
    "uvicorn[standard]>=0.40",
    "pydantic[email]>=2.10",
    "pydantic-settings>=2.7",
    "python-multipart>=0.0.18",
]

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

# Version derived from git tags (see core pyproject for rationale). core and api
# share the same tag, so they stay in lockstep.
[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = true

[tool.hatch.build.targets.wheel]
packages = ["src/silverfish_api"]
