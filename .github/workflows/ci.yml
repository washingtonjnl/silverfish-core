name: CI

on:
  push:
    branches: [main]
  pull_request:

# Lint, strict types and the full test suite must all pass for a PR to be
# mergeable. These are non-negotiable gates for this project.
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so the git-derived package version resolves.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace (all packages)
        run: uv sync --all-packages

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy (strict)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest
