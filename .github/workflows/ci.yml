name: CI

on:
  push:
    branches: [main]
  pull_request:

# Lint, strict types and the full test suite must all pass for a PR to be
# mergeable. These are non-negotiable gates for this project.
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so the git-derived package version resolves.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace (all packages)
        run: uv sync --all-packages

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy (strict)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

      - name: OpenAPI spec is in sync with the API
        # The committed contract (packages/sdk-node/openapi.json) is the source
        # of truth for the SDKs; fail if the API has drifted from it. The version
        # field is git-derived (dev vs tag), so it is excluded from the compare.
        run: |
          uv run python scripts/export_openapi.py
          uv run python - <<'PY'
          import json, subprocess, sys
          generated = json.load(open("packages/sdk-node/openapi.json"))
          committed = json.loads(
              subprocess.check_output(["git", "show", "HEAD:packages/sdk-node/openapi.json"])
          )
          generated["info"].pop("version", None)
          committed["info"].pop("version", None)
          if generated != committed:
              print("OpenAPI drift: run scripts/export_openapi.py and commit.", file=sys.stderr)
              sys.exit(1)
          print("OpenAPI spec is in sync.")
          PY
          git checkout -- packages/sdk-node/openapi.json

  sdk-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: packages/sdk-node/pnpm-lock.yaml

      - name: Install SDK dependencies
        working-directory: packages/sdk-node
        run: pnpm install --frozen-lockfile

      - name: Generate the client from the OpenAPI contract
        working-directory: packages/sdk-node
        run: pnpm run generate

      - name: Type-check the SDK
        working-directory: packages/sdk-node
        run: pnpm run typecheck

      - name: Build the SDK (ESM + CJS + types)
        working-directory: packages/sdk-node
        run: pnpm run build
